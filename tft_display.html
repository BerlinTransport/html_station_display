<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BVG DAISY Monitor - Filter Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bvg-yellow: #fbd100;
        --lcd-bg: #ffffff;
        --lcd-text: #000000;
        --lcd-border: #dcdcdc;
        --bvg-red: #be140e;
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: 'Roboto', sans-serif; overflow: hidden; }

    /* --- STARTMENÜ --- */
    #search-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column;
        justify-content: center; align-items: center; color: white;
    }
    .config-panel { 
        background: #262626; padding: 30px; border-radius: 15px; 
        width: 90%; max-width: 600px; border: 1px solid #333;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .config-panel h2 { color: var(--bvg-yellow); margin: 0 0 20px 0; font-size: 24px; }
    
    .config-group { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; font-size: 16px; }
    .config-group input[type="number"] { width: 60px; padding: 8px; border-radius: 5px; border: none; text-align: center; font-weight: bold; background: white; }
    
    /* Pill-Buttons Styling */
    .transport-pills { display: flex; gap: 8px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
    .pill { 
        background: #444; color: #aaa; padding: 8px 18px; 
        border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;
        border: 2px solid transparent; transition: all 0.2s;
        user-select: none;
    }
    .pill.active {
        background: var(--bvg-yellow);
        color: black;
    }

    #station-query { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px 8px 0 0; border: none; outline: none; margin-top: 10px; }
    #results-list { list-style: none; padding: 0; background: white; color: black; max-height: 250px; overflow-y: auto; border-radius: 0 0 8px 8px; margin: 0; }
    #results-list li { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 16px; }
    #results-list li:hover { background: #f0f0f0; }

    /* --- MONITOR DESIGN --- */
    #monitor { display: none; flex-direction: column; height: 100vh; width: 100vw; background: var(--lcd-bg); }
    .screen-content { flex: 1; display: flex; flex-direction: column; }

    .row {
        display: grid;
        grid-template-columns: 12% 75% 13%;
        align-items: center;
        padding: 0 1.5vw;
        border-bottom: 1.5px solid var(--lcd-border);
        color: var(--lcd-text);
        width: 100%;
        overflow: hidden;
    }

    .line-number {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0.1em 0.3em; border-radius: 4px; color: white; font-weight: 900;
        min-width: 2.2em; height: 1.4em; font-size: 0.8em;
    }

    .destination-container { padding-left: 15px; white-space: nowrap; overflow: hidden; display: flex; align-items: center; }
    .destination { font-weight: 700; display: inline-block; transform-origin: left center; }

    .time-cell { height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 1vw; font-weight: 900; }
    .time-cell:not(.is-now)::after { content: " '"; margin-left: 2px; }

    @keyframes flash-red {
        0%, 49% { background: var(--bvg-red); color: white; }
        50%, 100% { background: transparent; color: var(--lcd-text); }
    }
    .time-cell.is-now { animation: flash-red 1s steps(1) infinite; justify-content: center; padding-right: 0; }

    .footer { height: 10vh; background: var(--bvg-yellow); display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; border-top: 5px solid black; flex-shrink: 0; }
    .station-name { font-weight: 900; font-size: 4.5vh; color: black; }
    .bvg-logo { font-family: "Arial Black", sans-serif; font-size: 5.5vh; letter-spacing: -2px; color: black; }
</style>
</head>
<body>

<div id="search-overlay">
    <div class="config-panel">
        <h2>DAISY Konfiguration</h2>
        <div class="config-group">
            <label>Zeilen-Budget (Gesamt):</label>
            <input type="number" id="cfg-max-lines" value="7">
        </div>
        <div class="config-group">
            <label>Verkleinern ab Zeichen:</label>
            <input type="number" id="cfg-threshold" value="22">
        </div>
        
        <div class="transport-pills" id="pill-container">
            <div class="pill active" data-type="suburban">S-Bahn</div>
            <div class="pill active" data-type="subway">U-Bahn</div>
            <div class="pill active" data-type="tram">Tram</div>
            <div class="pill active" data-type="bus">Bus</div>
            <div class="pill active" data-type="regional">Regio</div>
        </div>

        <input type="text" id="station-query" placeholder="Haltestelle suchen (z.B. Ostkreuz)" autocomplete="off">
        <ul id="results-list"></ul>
    </div>
</div>

<div id="monitor">
    <div class="screen-content" id="led-container"></div>
    <div class="footer">
        <div class="station-name" id="display-station-name">-</div>
        <div class="bvg-logo">BVG</div>
    </div>
</div>

<script>
    const lineColors = {
        'U1': '#7dad4c', 'U2': '#da421e', 'U3': '#00a191', 'U4': '#f9d205',
        'U5': '#7e4d25', 'U6': '#6c6c95', 'U7': '#7599cc', 'U8': '#003380', 'U9': '#f0d722',
        'S1': '#f46a94', 'S2': '#006131', 'S25': '#006131', 'S26': '#006131', 'S3': '#00538f',
        'S41': '#a3301a', 'S42': '#cc6633', 'S45': '#cc6633', 'S46': '#cc6633', 'S47': '#cc6633',
        'S5': '#ff8a00', 'S7': '#7b107d', 'S75': '#7b107d', 'S8': '#5d9222', 'S85': '#5d9222', 'S9': '#8d2341',
        'default-bus': '#95276e', 'default-tram': '#be140e', 'default-regio': '#da251d'
    };

    let currentId = null;
    let timer = null;

    // Pill-Logik: Klicken zum Umschalten
    document.querySelectorAll('.pill').forEach(pill => {
        pill.onclick = () => pill.classList.toggle('active');
    });

    document.getElementById('station-query').addEventListener('input', async (e) => {
        const q = e.target.value;
        if (q.length < 3) return;
        try {
            const r = await fetch(`https://v6.vbb.transport.rest/locations?query=${encodeURIComponent(q)}&results=5`);
            const data = await r.json();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            data.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s.name;
                li.onclick = () => {
                    currentId = s.id;
                    document.getElementById('display-station-name').textContent = s.name;
                    document.getElementById('search-overlay').style.display = 'none';
                    document.getElementById('monitor').style.display = 'flex';
                    startMonitor();
                };
                list.appendChild(li);
            });
        } catch(e) {}
    });

    function startMonitor() {
        update();
        if(timer) clearInterval(timer);
        timer = setInterval(update, 30000);
    }

    function getLineColor(dep) {
        if (lineColors[dep.line.name]) return lineColors[dep.line.name];
        if (dep.line.product === 'bus') return lineColors['default-bus'];
        if (dep.line.product === 'tram') return lineColors['default-tram'];
        if (dep.line.product === 'regional') return lineColors['default-regio'];
        return '#444444';
    }

    async function update() {
        if(!currentId) return;
        const maxLines = parseInt(document.getElementById('cfg-max-lines').value) || 7;
        const threshold = parseInt(document.getElementById('cfg-threshold').value) || 22;
        
        const activeTypes = Array.from(document.querySelectorAll('.pill.active')).map(p => p.dataset.type);

        try {
            // Erhöhte Anzahl an Ergebnissen für bessere Sortiergrundlage
            const res = await fetch(`https://v6.vbb.transport.rest/stops/${currentId}/departures?duration=90&results=50`);
            const data = await res.json();
            const container = document.getElementById('led-container');
            container.innerHTML = '';

            // 1. SCHRITT: Filtern
            let departures = data.departures.filter(dep => activeTypes.includes(dep.line.product));

            // 2. SCHRITT: Strikte chronologische Sortierung (Fehlerbehebung für große Bahnhöfe)
            departures.sort((a, b) => {
                const timeA = new Date(a.when || a.plannedWhen);
                const timeB = new Date(b.when || b.plannedWhen);
                return timeA - timeB;
            });

            const rowHeight = 90 / maxLines;

            // 3. SCHRITT: Anzeige der sortierten Liste
            departures.slice(0, maxLines).forEach(dep => {
                const departureTime = new Date(dep.when || dep.plannedWhen);
                const diff = Math.round((departureTime - new Date()) / 60000);
                const min = diff <= 0 ? 0 : diff;
                const bgColor = getLineColor(dep);
                
                let scaleX = 1;
                if (dep.direction.length > threshold) {
                    scaleX = threshold / dep.direction.length;
                    if (scaleX < 0.55) scaleX = 0.55;
                }

                const row = document.createElement('div');
                row.className = `row`;
                row.style.height = rowHeight + 'vh';
                row.style.fontSize = (rowHeight * 0.7) + 'vh'; 

                row.innerHTML = `
                    <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
                        <div class="line-number" style="background-color: ${bgColor}">${dep.line.name}</div>
                    </div>
                    <div class="destination-container">
                        <div class="destination" style="transform: scaleX(${scaleX})">${dep.direction}</div>
                    </div>
                    <div class="time-cell ${min === 0 ? 'is-now' : ''}">${min === 0 ? 'jetzt' : min}</div>
                `;
                container.appendChild(row);
            });
        } catch(e) { console.error("Sortierfehler/API-Fehler:", e); }
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'Escape') {
            document.getElementById('search-overlay').style.display = 'flex';
            document.getElementById('monitor').style.display = 'none';
            clearInterval(timer);
        }
    });
</script>
</body>
</html>
