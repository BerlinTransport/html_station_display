<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BVG Monitor - Setup</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .config-panel { background: #222; padding: 30px; border-radius: 12px; width: 400px; border: 1px solid #444; }
        .group { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        input, select { padding: 8px; border-radius: 4px; border: none; }
        #station-query { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 12px; }
        #results { list-style: none; padding: 0; background: white; color: black; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        #results li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        #results li:hover { background: #fbd100; }
    </style>
</head>
<body>
    <div class="config-panel">
        <h2 style="color:#fbd100">Monitor Setup</h2>
        
        <div class="group">
            <label>Design:</label>
            <select id="theme">
                <option value="theme-led">DAISY LED (Schwarz)</option>
                <option value="theme-epaper">E-Paper (Weiß)</option>
            </select>
        </div>

        <div class="group">
            <label>Zeilen:</label>
            <input type="number" id="lines" value="7" min="1" max="15">
        </div>

        <div class="group">
            <label>Umbruch ab Zeichen:</label>
            <input type="number" id="threshold" value="22">
        </div>

        <input type="text" id="station-query" placeholder="Haltestelle suchen...">
        <ul id="results"></ul>
    </div>

    <script>
        const queryInput = document.getElementById('station-query');
        queryInput.addEventListener('input', async () => {
            if (queryInput.value.length < 3) return;
            const res = await fetch(`https://v6.vbb.transport.rest/locations?query=${encodeURIComponent(queryInput.value)}&results=5&stops=true`);
            const stations = await res.json();
            
            const list = document.getElementById('results');
            list.innerHTML = '';
            stations.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s.name;
                li.onclick = () => {
                    const theme = document.getElementById('theme').value;
                    const lines = document.getElementById('lines').value;
                    const threshold = document.getElementById('threshold').value;
                    
                    // Weiterleitung mit Parametern
                    window.location.href = `monitor.html?id=${s.id}&name=${encodeURIComponent(s.name)}&theme=${theme}&lines=${lines}&threshold=${threshold}`;
                };
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
