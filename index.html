<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BVG DAISY - Daisy & TFT</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@600&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/startmenu.css">
<link rel="stylesheet" href="css/monitor-daisy.css">
<link rel="stylesheet" href="css/monitor-tft.css">
</head>
<body>

<div id="loader-overlay">
  <div class="loader"></div>
</div>

<div id="search-overlay">
    <div class="config-panel">
        <h2>Station Display Konfiguration</h2>

        <div class="config-group">
            <label>Display:</label>
            <div id="variant-selector">
                <button class="variant-btn active" data-variant="daisy">Daisy</button>
                <button class="variant-btn" data-variant="tft">TFT</button>
            </div>
        </div>

        <div class="config-group">
        <label>Zeilen:</label>
        <select id="lines-select" class="lines-dropdown">
            <option value="5">5 Zeilen</option>
            <option value="6">6 Zeilen</option>
            <option value="7" selected>7 Zeilen</option>
            <option value="8">8 Zeilen</option>
            <option value="9">9 Zeilen</option>
            <option value="10">10 Zeilen</option>
        </select>
        </div>

        <!-- Lauftext — nur bei Daisy sichtbar -->
        <div class="config-group" id="cfg-group-ticker">
        <label>Lauftext</label>
        <button class="variant-btn active" id="cfg-show-ticker" data-active="true">An</button>
        </div>

        <!-- Dunkler Modus — nur bei TFT sichtbar -->
        <div class="config-group" id="cfg-group-darkmode" style="display:none">
        <label>Dunkler Modus</label>
        <button class="variant-btn" id="cfg-dark-mode" data-active="false">Aus</button>
        </div>

        <div class="config-group">
            <label>Verkehrsmittel:</label>
            <div class="filter-bar">
                <input type="checkbox" id="f-suburban" checked><label for="f-suburban">S-Bahn</label>
                <input type="checkbox" id="f-subway" checked><label for="f-subway">U-Bahn</label>
                <input type="checkbox" id="f-tram" checked><label for="f-tram">Tram</label>
                <input type="checkbox" id="f-bus" checked><label for="f-bus">Bus</label>
                <input type="checkbox" id="f-regional" checked><label for="f-regional">Regio</label>
            </div>
        </div>

        <div class="config-group">
        <label>Linienfilter (optional):</label>
        <input type="text" id="cfg-line-filter" placeholder="z.B. S3, 60, 61" autocomplete="off">
        </div>

        <input type="text" id="station-query" placeholder="Haltestelle suchen..." autocomplete="off">
        <ul id="results-list"></ul>
        <div id="search-status">
          <span id="search-loader" class="inline-loader" style="display:none;"></span>
          <span id="search-error"></span>
        </div>
    </div>
</div>

<!-- DAISY MONITOR -->
<div id="monitor-daisy">
    <div class="header-daisy">
        <span>Linie</span><span>Ziel</span><span style="text-align:right">Abfahrt</span>
    </div>
    <div class="led-screen" id="led-container-daisy"></div>
</div>

<!-- TFT MONITOR -->
<div id="monitor-tft">
    <div class="screen-content" id="led-container-tft"></div>
</div>

<!-- GLOBALER FOOTER -->
<div id="global-footer">
    <div id="global-footer-left">
        <button class="footer-back-btn" id="footer-back-btn">&#8592; Zurück</button>
        <span class="gf-sep">|</span>
        <span class="gf-label">API-Data provided by</span>
        <a href="https://v6.vbb.transport.rest/" target="_blank" rel="noopener">
            <img class="gf-vbb-logo"
                src="https://unternehmen.vbb.de/fileadmin/user_upload/VBB/Bilder/VBB-Logos/vbb-logo-bildmarke.svg"
                alt="VBB">
        </a>
    </div>
    <div id="global-footer-center">
        <span id="global-station-name"></span>
        <span id="gf-sep" class="gf-sep">|</span>
        <span id="global-clock"></span>
    </div>

    <div id="global-footer-right">
        <img class="gf-avatar"
             src="https://avatars.githubusercontent.com/BerlinTransport?v=4"
             alt="BerlinTransport"
             onerror="this.style.display='none'">
        <a href="https://github.com/BerlinTransport" target="_blank" rel="noopener">BerlinTransport</a>
        <span class="gf-sep">|</span>
        <a href="https://github.com/BerlinTransport/bvg_daisy_station_display" target="_blank" rel="noopener">bvg_daisy_station_display</a>
        <span class="gf-sep">|</span>
        <span class="gf-version">v0.0.2</span>
    </div>
</div>

<!-- LED-Filter SVG -->
<svg style="position:absolute; width:0; height:0">
<defs>
<filter id="ledFilter">
    <feImage x="0" y="0" width="4" height="4" result="dot" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxjaXJjbGUgY3g9IjIiIGN5PSIyIiByPSIxLjUiIGZpbGw9IndoaXRlIi8+PC9zdmc+"/>
    <feTile result="grid"/>
    <feComposite operator="in" in="SourceGraphic" in2="grid"/>
</filter>
</defs>
</svg>

<script src="js/globals.js"></script>
<script src="js/config.js"></script>
<script src="js/search.js"></script>
<script src="js/render-daisy.js"></script>
<script src="js/render-tft.js"></script>
<script src="js/monitor.js"></script>
</body>
</html>
